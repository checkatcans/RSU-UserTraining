apiVersion: apps/v1
kind: Deployment
metadata:
  name: gradio-chatbot
  namespace: test06-restricted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gradio
  template:
    metadata:
      labels:
        app: gradio
    spec:
      containers:
      - name: gradio
        image: choocku/gradio-ollama:latest
        ports:
        - containerPort: 7860
        env:
        - name: OLLAMA_URL
          value: "http://ollama-svc:11434"
