apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: test06-restricted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports:
        - containerPort: 11434
        resources:
          limits:
            nvidia.com/gpu: "1"
        env:
        - name: OLLAMA_HOST
          value: "0.0.0.0:11434"
        - name: OLLAMA_MODELS
          value: "/models"
        volumeMounts:
        - name: ollama-models
          mountPath: /models
      volumes:
      - name: ollama-models
        hostPath:
          type: Directory
          path: /data/home/test06/ollama_models/models
