apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vllm-model-cache
  namespace: test01-restricted
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: nfs-client
  resources:
    requests:
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-qwen25-3b
  namespace: test01-restricted
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vllm-qwen25-3b
  template:
    metadata:
      labels:
        app: vllm-qwen25-3b
    spec:
      containers:
      - name: vllm
        image: vllm/vllm-openai:latest
        args:
        - --model
        - Qwen/Qwen2.5-3B-Instruct
        - --dtype
        - bfloat16
        - --max-model-len
        - "8192"
        - --gpu-memory-utilization
        - "0.90"
        env:
        - name: HF_HOME
          value: /cache
        ports:
        - containerPort: 8000
        resources:
          limits:
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: model-cache
          mountPath: /cache
        - name: shm
          mountPath: /dev/shm
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: vllm-model-cache
      - name: shm
        emptyDir:
          medium: Memory
          sizeLimit: 4Gi
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-qwen25-3b
  namespace: test01-restricted
spec:
  type: NodePort
  selector:
    app: vllm-qwen25-3b
  ports:
  - port: 8000
    targetPort: 8000
